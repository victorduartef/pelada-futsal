<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pelada Futsal ⚽</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh}
.app{width:100%;max-width:720px;margin:0 auto;padding:12px 12px 40px}
.header{display:flex;align-items:center;gap:10px;padding:12px 0 14px;border-bottom:1.5px solid #e0e0d8;margin-bottom:14px}
.header-title{font-size:18px;font-weight:800;color:#1a1a1a}
.header-sub{font-size:11px;color:#aaa;margin-top:1px;font-weight:500}
.sync-badge{margin-left:auto;display:inline-flex;align-items:center;gap:5px;font-size:11px;color:#888;padding:3px 9px;background:#fff;border-radius:20px;border:1px solid #e0e0d8;font-weight:500}
.sdot{width:7px;height:7px;border-radius:50%;background:#7cc060;flex-shrink:0}
.sdot.spin{background:#f0c040;animation:blink 1s infinite}
.sdot.err{background:#e06060}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.tabs{display:flex;gap:0;border-bottom:1.5px solid #e0e0d8;margin-bottom:14px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:8px 10px;font-size:11px;font-weight:700;border:none;background:none;cursor:pointer;color:#aaa;border-bottom:2.5px solid transparent;margin-bottom:-1.5px;white-space:nowrap;letter-spacing:.2px;transition:color .15s}
.tab.active{color:#1a1a1a;border-bottom:2.5px solid #1a1a1a}
.sec{display:none}.sec.active{display:block}
.card{background:#fff;border:1px solid #e8e8e0;border-radius:12px;padding:14px 16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.mgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(88px,1fr));gap:7px;margin-bottom:12px}
.mcard{background:#f8f8f4;border-radius:8px;padding:9px 11px;border:1px solid #eeeee6}
.mlbl{font-size:10px;color:#aaa;margin-bottom:2px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.mval{font-size:20px;font-weight:800}
.msub{font-size:11px;color:#aaa;margin-top:2px}
.btn{padding:7px 13px;border:1.5px solid #d0d0c8;border-radius:8px;background:#fff;cursor:pointer;font-size:12px;font-weight:700;color:#1a1a1a;transition:all .15s;letter-spacing:.1px}
.btn:hover{background:#f5f5f0}
.btn-p{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.btn-p:hover{background:#333}
.btn-sm{padding:4px 9px;font-size:11px}
.btn-danger{color:#b03030;border-color:#dda0a0}
.btn-danger:hover{background:#fdf0f0}
.btn-edit{color:#185fa5;border-color:#a0c0e0}
.btn-edit:hover{background:#eef4fb}
.btn-ok{background:#2d5a1b;color:#fff;border-color:#2d5a1b}
.btn-ok:hover{opacity:.88;background:#2d5a1b}
input,select,textarea{width:100%;padding:8px 10px;border:1.5px solid #d8d8d0;border-radius:8px;background:#fff;color:#1a1a1a;font-size:13px;font-family:inherit;transition:border-color .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:#1a1a1a}
label{font-size:10px;color:#888;display:block;margin-bottom:3px;margin-top:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.row{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap}
.field{flex:1;min-width:80px}
h3{font-size:14px;font-weight:800;margin-bottom:10px;letter-spacing:.1px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;font-size:10px;font-weight:700;color:#aaa;padding:6px 4px;border-bottom:1.5px solid #eee;white-space:nowrap;text-transform:uppercase;letter-spacing:.3px}
th.r,td.r{text-align:right}
td{padding:7px 4px;border-bottom:1px solid #f5f5ee;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafaf6}
.rnk{font-size:11px;color:#ccc;width:18px;font-weight:700}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700}
.ba{background:#e6f1fb;color:#0c447c}.bb{background:#fde8e4;color:#8b1a0e}
.bv{background:#e8f5df;color:#2d5a1b}.bd{background:#fde8e4;color:#8b1a0e}.be{background:#f5f5ea;color:#666}
.bm{background:#e8f5df;color:#2d5a1b}.bav{background:#fff3e0;color:#8b4513}.bgo{background:#e6f1fb;color:#0c447c}
.bwaz{background:#d8eeff;color:#0c447c;font-weight:800}.bwve{background:#fde8e4;color:#8b1a0e;font-weight:800}.bwem{background:#fef8d8;color:#7a6200;font-weight:800}
.sdiv{font-size:10px;color:#aaa;margin:.7rem 0 .35rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.u8b{background:#fff3e0;color:#8b4513;padding:1px 6px;border-radius:10px;font-size:10px;font-weight:700;margin-left:4px}
.sc-row{display:flex;align-items:center;justify-content:center;gap:2rem;padding:.8rem 0}
.sc-team{text-align:center;flex:1}
.sc-name{font-size:11px;color:#aaa;margin-bottom:4px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.sc-num{font-size:40px;font-weight:900;line-height:1}
.sc-a{color:#185fa5}.sc-b{color:#c0392b}
.ev-list{max-height:175px;overflow-y:auto}
.ev-row{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid #f5f5ee;font-size:12px}
.ev-row:last-child{border-bottom:none}
.empty{text-align:center;padding:3rem;color:#bbb;font-size:13px;font-weight:500}
.alert{padding:10px 14px;border-radius:8px;font-size:12px;margin-bottom:12px;font-weight:500;line-height:1.5}
.ai{background:#eef5ff;color:#0c447c;border:1px solid #b8d4f0}
.aw{background:#fff8e0;color:#8b5000;border:1px solid #f0d880}
.as{background:#e8f5df;color:#2d5a1b;border:1px solid #a8d888}
.chip{display:inline-block;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid #d0d0c8;background:#f8f8f4;margin:2px;transition:all .15s}
.chip:hover{border-color:#999}
.chip.sel{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.chip.ca{background:#e6f1fb;color:#0c447c;border-color:#80b8e8}
.chip.cb{background:#fde8e4;color:#8b1a0e;border-color:#e8a090}
.fbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px;padding:8px 12px;background:#f8f8f4;border-radius:8px;border:1px solid #eeeee6}
.ftog{display:flex;gap:3px;flex-wrap:wrap}
.ftog button{padding:4px 10px;font-size:11px;border:1.5px solid #d0d0c8;border-radius:20px;cursor:pointer;background:#fff;color:#888;font-weight:700;white-space:nowrap;transition:all .15s}
.ftog button:hover{border-color:#999}
.ftog button.on{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.dp{color:#2d5a1b;font-size:11px;font-weight:700}.dn{color:#b03030;font-size:11px;font-weight:700}.dz{color:#bbb;font-size:11px}
.rdot{display:inline-block;width:22px;height:22px;border-radius:50%;font-size:10px;font-weight:700;text-align:center;line-height:22px}
.rv{background:#e8f5df;color:#2d5a1b}.rd{background:#fde8e4;color:#8b1a0e}.re{background:#f5f5ea;color:#888}
.av{width:36px;height:36px;border-radius:50%;background:#e6f1fb;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;color:#0c447c;flex-shrink:0;border:1.5px solid #b8d4f0}
.pr{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f5f5ee}
.pr:last-child{border-bottom:none}
.ttog{display:flex;gap:3px}
.ttog button{padding:3px 8px;font-size:11px;border:1.5px solid #d0d0c8;border-radius:20px;cursor:pointer;background:#fff;color:#888;font-weight:700;transition:all .15s}
.ttog button.tm{background:#e8f5df;color:#2d5a1b;border-color:#88c870}
.ttog button.ta{background:#fff3e0;color:#8b4513;border-color:#e8b870}
.ttog button.tg{background:#e6f1fb;color:#0c447c;border-color:#80b8e8}
.rc{background:#f8f8f4;border-radius:8px;padding:10px 14px;margin-bottom:6px;display:flex;align-items:center;gap:12px;border:1px solid #eeeee6}
.rv2{font-size:24px;font-weight:800;min-width:36px;text-align:center}
.ri{flex:1}.rl{font-size:10px;color:#aaa;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.rd2{font-size:13px;font-weight:700;margin-top:2px}
.top1{background:#c8e8b0!important;color:#1a4a0a;font-weight:800}
.top2{background:#daf0c8!important;color:#2a5a14}
.top3{background:#ecf8dc!important;color:#3a6a1e}
.gtag{display:inline-block;padding:0 5px;border-radius:6px;font-size:10px;background:#e6f1fb;color:#0c447c;margin-left:3px;font-weight:700}
.erow{display:flex;align-items:center;gap:6px;padding:7px 0;border-bottom:1px solid #f5f5ee;font-size:12px}
.erow:last-child{border-bottom:none}
.sbw{margin-bottom:11px}
.sbn{font-size:13px;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center;font-weight:700}
.sbt{display:flex;height:26px;border-radius:8px;overflow:hidden;border:1px solid #e8e8e0}
.sbs{display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.lovl{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:999}
.lmod{background:#fff;border-radius:16px;padding:24px;width:300px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
hr.div{border:none;border-top:1px solid #eee;margin:14px 0}
</style>
</head>
<body>
<div class="app">
<div class="header">
  <span style="font-size:26px">⚽</span>
  <div>
    <div class="header-title">Pelada Futsal</div>
    <div class="header-sub">Estatísticas da galera</div>
  </div>
  <span class="sync-badge" id="sbadge"><span class="sdot spin" id="sdot"></span><span id="stxt">Conectando...</span></span>
</div>
<div class="tabs">
  <button class="tab active" onclick="go('stats')">Estatísticas</button>
  <button class="tab" onclick="go('score')">Score</button>
  <button class="tab" onclick="go('atleta')">Atleta</button>
  <button class="tab" onclick="go('u8')">Últ. 8</button>
  <button class="tab" onclick="go('elenco')">Elenco</button>
  <button class="tab" onclick="go('partida')">Registrar</button>
  <button class="tab" onclick="go('historico')">Histórico</button>
  <button class="tab" onclick="go('foto')">Foto</button>
  <button class="tab" onclick="go('dados')">Dados</button>
</div>
<div id="s-stats" class="sec active"></div>
<div id="s-score" class="sec"></div>
<div id="s-atleta" class="sec"></div>
<div id="s-u8" class="sec"></div>
<div id="s-elenco" class="sec"></div>
<div id="s-partida" class="sec"></div>
<div id="s-historico" class="sec"></div>
<div id="s-foto" class="sec"></div>
<div id="s-dados" class="sec"></div>
</div>

<div class="lovl" id="lovl" style="display:none">
  <div class="lmod">
    <div style="font-size:16px;font-weight:800;margin-bottom:6px">🔒 Acesso restrito</div>
    <div style="font-size:13px;color:#666;margin-bottom:14px">Digite a senha de administrador.</div>
    <input type="password" id="lpwd" placeholder="Senha" onkeydown="if(event.key==='Enter')chkPwd()" style="margin-bottom:10px">
    <div id="lerr" style="font-size:12px;color:#b03030;min-height:16px;margin-bottom:10px"></div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-p" onclick="chkPwd()" style="flex:1">Entrar</button>
      <button class="btn" onclick="closeLock()">Cancelar</button>
    </div>
  </div>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getDatabase,ref,set,get,onValue}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
const cfg={apiKey:"AIzaSyBnabdeOTMZ3KLFyVmSMO1El_EWSiJFREQ",authDomain:"pelada-futsal.firebaseapp.com",databaseURL:"https://pelada-futsal-default-rtdb.firebaseio.com",projectId:"pelada-futsal",storageBucket:"pelada-futsal.firebasestorage.app",messagingSenderId:"225126749584",appId:"1:225126749584:web:07bc8688c7e2682ea70f15"};
const fapp=initializeApp(cfg);
const fdb=getDatabase(fapp);
function ss(st){const d=document.getElementById('sdot'),t=document.getElementById('stxt');if(!d)return;d.className='sdot'+(st==='spin'?' spin':st==='err'?' err':'');t.textContent=st==='ok'?'Sincronizado':st==='spin'?'Salvando...':'Erro';}
window._fbSave=async(data)=>{ss('spin');try{await set(ref(fdb,'pelada'),data);ss('ok');}catch(e){ss('err');}};
window._fbLoad=async()=>{ss('spin');try{const s=await get(ref(fdb,'pelada'));ss('ok');return s.exists()?s.val():null;}catch(e){ss('err');return null;}};
window._fbListen=(cb)=>{onValue(ref(fdb,'pelada'),(s)=>{ss('ok');if(s.exists())cb(s.val());},(e)=>ss('err'));};
window._fbReady=true;
if(window._appBoot)window._appBoot();
</script>

<script>
const APWD='pelada123';
let db={rows:[],elenco:[]};
let fAv=false,fMes='todos',selAt='',rChart=null,editD=null;
let isAdm=false,pendFn=null;

function syncSave(){if(window._fbSave)window._fbSave(db);}

window._appBoot=async function(){
  const d=await(window._fbLoad?window._fbLoad():null);
  if(d&&d.rows&&d.rows.length){db=d;}else{seed();}
  if(!db.elenco)db.elenco=[];
  if(window._fbListen)window._fbListen(d=>{if(d&&d.rows){db=d;const tabs=['stats','score','atleta','u8','elenco','partida','historico','foto','dados'];const at=document.querySelector('.tab.active');if(at){const i=[...document.querySelectorAll('.tab')].indexOf(at);if(i>=0)go(tabs[i]);}}});
  go('stats');
};
if(window._fbReady)window._appBoot();

function reqAdm(fn){if(isAdm){fn();return;}pendFn=fn;document.getElementById('lovl').style.display='flex';document.getElementById('lpwd').value='';document.getElementById('lerr').textContent='';setTimeout(()=>document.getElementById('lpwd').focus(),80);}
function chkPwd(){if(document.getElementById('lpwd').value===APWD){isAdm=true;document.getElementById('lovl').style.display='none';if(pendFn){pendFn();pendFn=null;}}else{document.getElementById('lerr').textContent='Senha incorreta.';document.getElementById('lpwd').value='';}}
function closeLock(){document.getElementById('lovl').style.display='none';pendFn=null;}

// helpers
const nT=s=>{if(!s)return'';const l=s.trim().toLowerCase();if(l.includes('az'))return'Azul';if(l.includes('ver'))return'Vermelho';return s.trim();};
const nR=s=>{if(!s)return'';const l=s.trim().toLowerCase();if(l.includes('vit'))return'Vitória';if(l.includes('der'))return'Derrota';if(l.includes('emp')||l.includes('mpat'))return'Empate';return s.trim();};
const isGP=s=>s&&s.toLowerCase().includes('goleiro');
const nN=s=>{if(!s)return'';s=s.trim().replace(/\s*\(.*?\)\s*/g,'').trim();return s.split(' ').map(w=>w.charAt(0).toUpperCase()+w.slice(1).toLowerCase()).join(' ');};
const exD=n=>{const d=new Date(Math.round((n-25569)*86400*1000));d.setDate(d.getDate()+1);return d.toLocaleDateString('pt-BR');};
const clsM=s=>{if(!s)return'avulso';const l=s.trim().toLowerCase();if(l==='goleiro'||l.includes('goleiro'))return'goleiro';if(l==='avulso')return'avulso';const m=['janeiro','fevereiro','marco','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];if(m.some(x=>l.includes(x.replace('ç','c'))))return'mensalista';return'avulso';};
const MES=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const dMes=d=>{const p=d.split('/');return p.length===3?MES[parseInt(p[1])-1]||null:null;};
const getMD=()=>{const f=new Set();db.rows.forEach(r=>{const m=dMes(r.date);if(m)f.add(m);});return MES.filter(m=>f.has(m));};
const tipoJ=n=>{const e=db.elenco.find(p=>p.nome===n);return e?e.tipo:'avulso';};
const isGolC=n=>{const e=db.elenco.find(p=>p.nome===n);return e?(e.goleiro||e.tipo==='goleiro'):false;};
const aF=rows=>rows.filter(r=>{if(isGolC(r.jogador))return false;if(fMes!=='todos'){const m=dMes(r.date);if(m!==fMes)return false;}const t=tipoJ(r.jogador);if(t==='mensalista')return true;if(t==='avulso')return fAv;return false;});
const sD=(a,b)=>{const p=x=>{const t=x.split('/');return t.length===3?new Date(t[2],t[1]-1,t[0]):new Date(0);};return p(a)-p(b);};
const gDates=rows=>[...new Set((rows||db.rows).map(r=>r.date))].sort(sD);
const cSt=rows=>{const s={};rows.forEach(r=>{if(!s[r.jogador])s[r.jogador]={gols:0,ass:0,v:0,e:0,d:0,jogos:0,pts:0};const p=s[r.jogador];p.gols+=r.gols;p.ass+=r.ass;p.jogos++;if(r.resultado==='Vitória'){p.v++;p.pts+=3;}else if(r.resultado==='Empate'){p.e++;p.pts+=1;}else if(r.resultado==='Derrota'){p.d++;}});return s;};
const gU8=rows=>{const pD={};rows.forEach(r=>{if(!pD[r.jogador])pD[r.jogador]=[];if(!pD[r.jogador].includes(r.date))pD[r.jogador].push(r.date);});const u={};Object.entries(pD).forEach(([p,ds])=>{u[p]=new Set(ds.slice().sort(sD).slice(-8));});return rows.filter(r=>u[r.jogador]&&u[r.jogador].has(r.date));};
const t3c=(v,s)=>{const r=s.indexOf(v);return r===0?'top1':r===1?'top2':r===2?'top3':'';};
function cSeq(rows,nome){const pr=rows.filter(r=>r.jogador===nome);const dates=[...new Set(pr.map(r=>r.date))].sort(sD);const res=dates.map(d=>pr.find(r=>r.date===d)?.resultado||'');let mV=0,cV=0,mD=0,cD=0;res.forEach(r=>{if(r==='Vitória'){cV++;if(cV>mV)mV=cV;cD=0;}else{cV=0;if(r==='Derrota'){cD++;if(cD>mD)mD=cD;}else cD=0;}});let sVa=0,sDa=0;for(let i=res.length-1;i>=0;i--){if(res[i]==='Vitória')sVa++;else break;}for(let i=res.length-1;i>=0;i--){if(res[i]==='Derrota')sDa++;else break;}return{maxV:mV,maxD:mD,curV:sVa,curD:sDa};}
function cRec(rows){const r={gols:{val:0,nome:'',date:''},ass:{val:0,nome:'',date:''},ga:{val:0,nome:'',date:''},mSV:{val:0,nome:''},mSD:{val:0,nome:''},cSV:{val:0,nome:''},cSD:{val:0,nome:''}};rows.forEach(x=>{if(x.gols>r.gols.val)r.gols={val:x.gols,nome:x.jogador,date:x.date};if(x.ass>r.ass.val)r.ass={val:x.ass,nome:x.jogador,date:x.date};const ga=x.gols+x.ass;if(ga>r.ga.val)r.ga={val:ga,nome:x.jogador,date:x.date};});const pl=[...new Set(rows.map(x=>x.jogador))];pl.forEach(p=>{const s=cSeq(rows,p);if(s.maxV>r.mSV.val)r.mSV={val:s.maxV,nome:p};if(s.maxD>r.mSD.val)r.mSD={val:s.maxD,nome:p};if(s.curV>r.cSV.val)r.cSV={val:s.curV,nome:p};if(s.curD>r.cSD.val)r.cSD={val:s.curD,nome:p};});return r;}

function fBar(sec){
  const nM=db.elenco.filter(p=>p.tipo==='mensalista').length,nA=db.elenco.filter(p=>p.tipo==='avulso').length;
  const ms=getMD();let h=`<div class="fbar" style="gap:6px">`;
  if(ms.length){h+=`<span style="font-size:10px;color:#888;font-weight:700">MÊS:</span><div class="ftog"><button class="${fMes==='todos'?'on':''}" onclick="setM('todos','${sec}')">Todos</button>`;ms.forEach(m=>h+=`<button class="${fMes===m?'on':''}" onclick="setM('${m}','${sec}')">${m}</button>`);h+=`</div><span style="width:1px;height:14px;background:#d8d8d0;display:inline-block;align-self:center;margin:0 2px"></span>`;}
  h+=`<div class="ftog"><button class="on" style="cursor:default">Mensalistas(${nM})</button><button class="${fAv?'on':''}" onclick="tgAv('${sec}')">+Avulsos(${nA})</button></div></div>`;
  return h;
}
function setM(m,s){fMes=m;go(s);}
function tgAv(s){fAv=!fAv;go(s);}

function go(tab){

function svEdit(d){const rows=db.rows.filter(r=>r.date===d);rows.forEach(r=>{const idx=db.rows.indexOf(r);const ni=document.getElementById(`en_${idx}`);const gi=document.getElementById(`eg_${idx}`);const ai=document.getElementById(`ea_${idx}`);if(ni){const nn=nN(ni.value);if(nn&&nn!==r.jogador){const eo=db.elenco.find(p=>p.nome===r.jogador);if(eo)eo.nome=nn;else db.elenco.push({id:'e_'+Date.now(),nome:nn,tipo:r.goleiro?'goleiro':'avulso',goleiro:r.goleiro});r.jogador=nn;}}if(gi)r.gols=parseInt(gi.value)||0;if(ai)r.ass=parseInt(ai.value)||0;});const az=db.rows.filter(r=>r.date===d&&r.time==='Azul'),ve=db.rows.filter(r=>r.date===d&&r.time==='Vermelho');const gA=az.reduce((s,r)=>s+r.gols,0),gV=ve.reduce((s,r)=>s+r.gols,0);const rA=gA>gV?'Vitória':gV>gA?'Derrota':'Empate',rV=gV>gA?'Vitória':gA>gV?'Derrota':'Empate';db.rows.forEach(r=>{if(r.date===d)r.resultado=r.time==='Azul'?rA:rV;});syncSave();editD=null;rHist();}

let match={fase:'cfg',tA:[],tB:[],evts:[],sA:0,sB:0,date:'',gA:null,gB:null};

  } else if(match.fase==='play'){

    if(match.evts.length){h+=`<div class="sdiv">EVENTOS (${match.evts.length})</div><div class="ev-list">`;[...match.evts].reverse().forEach((ev,ri)=>{const idx=match.evts.length-1-ri;const t=match.tA.includes(ev.g)?'Azul':'Vermelho';h+=`<div class="ev-row"><span>⚽</span><span class="badge ${t==='Azul'?'ba':'bb'}">${t}</span><span style="font-weight:700">${ev.g}</span>${ev.a?`<span style="color:#aaa">→ ${ev.a}</span>`:''}<span style="margin-left:auto;cursor:pointer;color:#ccc;font-size:18px;line-height:1" onclick="delG(${idx})">×</span></div>`;});h+=`</div>`;}

}
function togT(t,p){if(t==='A'){match.tA=match.tA.includes(p)?match.tA.filter(x=>x!==p):[...match.tA,p];match.tB=match.tB.filter(x=>x!==p);}else{match.tB=match.tB.includes(p)?match.tB.filter(x=>x!==p):[...match.tB,p];match.tA=match.tA.filter(x=>x!==p);}rPartida();}
function shuffM(){const allP=db.elenco.filter(p=>!p.goleiro&&p.tipo!=='goleiro');const sh=[...allP].sort(()=>Math.random()-.5);const mid=Math.floor(sh.length/2);match.tA=sh.slice(0,mid).map(p=>p.nome);match.tB=sh.slice(mid).map(p=>p.nome);const allG=db.elenco.filter(p=>p.goleiro||p.tipo==='goleiro');if(allG[0])match.gA=allG[0].nome;if(allG[1])match.gB=allG[1].nome;rPartida();}
function startM(){const dt=document.getElementById('mdt');const ga=document.getElementById('gasel');const gb=document.getElementById('gbsel');match.date=dt?dt.value:new Date().toLocaleDateString('pt-BR');if(ga)match.gA=ga.value||null;if(gb)match.gB=gb.value||null;match.fase='play';match.evts=[];match.sA=0;match.sB=0;rPartida();}

function svMatch(){const rA=match.sA>match.sB?'Vitória':match.sB>match.sA?'Derrota':'Empate';const rB=match.sB>match.sA?'Vitória':match.sA>match.sB?'Derrota':'Empate';const nr=[];match.tA.forEach(p=>{const g=match.evts.filter(e=>e.g===p).length;const a=match.evts.filter(e=>e.a===p).length;nr.push({date:match.date,time:'Azul',jogador:p,goleiro:false,gols:g,ass:a,resultado:rA,mensalista:'',tipo:tipoJ(p)});});match.tB.forEach(p=>{const g=match.evts.filter(e=>e.g===p).length;const a=match.evts.filter(e=>e.a===p).length;nr.push({date:match.date,time:'Vermelho',jogador:p,goleiro:false,gols:g,ass:a,resultado:rB,mensalista:'',tipo:tipoJ(p)});});if(match.gA){const g=match.evts.filter(e=>e.g===match.gA).length;const a=match.evts.filter(e=>e.a===match.gA).length;nr.push({date:match.date,time:'Azul',jogador:match.gA,goleiro:true,gols:g,ass:a,resultado:rA,mensalista:'Goleiro',tipo:'goleiro'});}if(match.gB){const g=match.evts.filter(e=>e.g===match.gB).length;const a=match.evts.filter(e=>e.a===match.gB).length;nr.push({date:match.date,time:'Vermelho',jogador:match.gB,goleiro:true,gols:g,ass:a,resultado:rB,mensalista:'Goleiro',tipo:'goleiro'});}db.rows=[...db.rows,...nr];syncSave();match={fase:'cfg',tA:[],tB:[],evts:[],sA:0,sB:0,date:'',gA:null,gB:null};go('stats');}

function parseR(txt){const lines=txt.trim().split('\n');const rows=[];for(const line of lines){const cols=line.split('\t');if(cols.length<5)continue;const dn=parseFloat(cols[0].trim());const ds=(!isNaN(dn)&&dn>1000)?exD(dn):cols[0].trim();const time=nT(cols[1]);const jr=cols[2]||'';const gol=isGP(jr);const jog=nN(jr);const gols=parseInt(cols[3])||0;const ass=parseInt(cols[4])||0;const res=nR(cols[5]||'');const mens=cols[6]||'';const tipo=gol?'goleiro':clsM(mens);if(!jog||['jogador','data','gol contra',''].some(x=>jog.toLowerCase()===x))continue;rows.push({date:ds,time,jogador:jog,goleiro:gol,gols,ass,resultado:res,mensalista:mens,tipo});}return rows;}
function impData(){const txt=document.getElementById('itxt').value;if(!txt.trim()){document.getElementById('imsg').innerHTML='<span style="color:#b03030">Cole os dados primeiro.</span>';return;}const rows=parseR(txt);if(!rows.length){document.getElementById('imsg').innerHTML='<span style="color:#b03030">Nenhuma linha reconhecida.</span>';return;}const seen=new Set(db.rows.map(r=>`${r.date}|${r.jogador}|${r.time}`));const nv=rows.filter(r=>!seen.has(`${r.date}|${r.jogador}|${r.time}`));nv.forEach(r=>{if(!db.elenco.find(p=>p.nome===r.jogador))db.elenco.push({id:'e_'+r.jogador.replace(/\s/g,'_')+Date.now(),nome:r.jogador,tipo:r.tipo,goleiro:r.goleiro});});db.rows=[...db.rows,...nv];syncSave();document.getElementById('imsg').innerHTML=`<span style="color:#2d5a1b;font-weight:700">${nv.length} novos registros importados.</span>`;rDados();}
function clearAll(){if(!confirm('Limpar TODOS os dados? Esta ação não pode ser desfeita.'))return;db={rows:[],elenco:[]};syncSave();rDados();}

function bExp(){return[...db.rows].sort((a,b)=>{const p=x=>{const t=x.split('/');return t.length===3?new Date(t[2],t[1]-1,t[0]):new Date(0);};const d=p(a.date)-p(b.date);if(d)return d;return a.time<b.time?-1:a.time>b.time?1:0;}).map(r=>({'Data':r.date,'Time':r.time,'Jogador':r.jogador,'Gols':r.gols,'Assistência':r.ass,'Resultado':r.resultado,'Mensalista':r.mensalista||r.tipo||''}));}
function expXLSX(){if(!db.rows.length){document.getElementById('estat').innerHTML='<span style="color:#b03030">Nenhum dado.</span>';return;}try{const d=bExp();const ws=XLSX.utils.json_to_sheet(d);ws['!cols']=[{wch:12},{wch:10},{wch:22},{wch:6},{wch:12},{wch:10},{wch:12}];const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,'Plan1',ws);const hj=new Date().toLocaleDateString('pt-BR').replace(/\//g,'-');XLSX.writeFile(wb,`pelada_backup_${hj}.xlsx`);document.getElementById('estat').innerHTML=`<span style="color:#2d5a1b;font-weight:700">✓ Exportado!</span> ${db.rows.length} registros em pelada_backup_${hj}.xlsx`;}catch(e){document.getElementById('estat').innerHTML=`<span style="color:#b03030">Erro: ${e.message}</span>`;}}
function expCSV(){if(!db.rows.length){document.getElementById('estat').innerHTML='<span style="color:#b03030">Nenhum dado.</span>';return;}const d=bExp();const hdr=Object.keys(d[0]).join('\t');const lns=d.map(r=>Object.values(r).join('\t'));const csv=[hdr,...lns].join('\n');const blob=new Blob(['\uFEFF'+csv],{type:'text/tab-separated-values;charset=utf-8'});const url=URL.createObjectURL(blob);const a=document.createElement('a');const hj=new Date().toLocaleDateString('pt-BR').replace(/\//g,'-');a.href=url;a.download=`pelada_backup_${hj}.csv`;a.click();URL.revokeObjectURL(url);document.getElementById('estat').innerHTML=`<span style="color:#2d5a1b;font-weight:700">✓ Exportado!</span> ${db.rows.length} registros em pelada_backup_${hj}.csv`;}
